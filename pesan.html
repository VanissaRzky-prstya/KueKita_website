<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pemesanan - KueKita</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>KueKita</h1>
    <nav>
      <a href="index.html">Beranda</a>
      <a href="produk.html">Produk</a>
      <a href="pesan.html" class="active">Pesan</a>
      <a href="kontak.html">Kontak</a>
    </nav>
  </header>

  <section class="pesan">
    <h2>Form Pemesanan 🍩</h2>
    <p>Isi data di bawah ini untuk memesan kue kesukaanmu!</p>

    <form id="formPemesanan">
      <label for="nama">Nama Lengkap:</label>
      <input type="text" id="nama" required>

      <label for="nomor">Nomor HP:</label>
      <input type="tel" id="nomor" required>

      <label for="jenisKue">Jenis Kue:</label>
      <select id="jenisKue" required>
        <option value="">-- Pilih Kue --</option>
        <option value="Bolu Pandan">Bolu Pandan</option>
        <option value="Brownies Coklat">Brownies Coklat</option>
        <option value="Tiramisu">Tiramisu</option>
        <option value="Kue Lapis Legit">Kue Lapis Legit</option>
      </select>

      <label for="jumlah">Jumlah Pesanan:</label>
      <input type="number" id="jumlah" min="1" required>

      <label for="alamat">Alamat Pengiriman:</label>
      <textarea id="alamat" rows="3" required></textarea>

      <button type="submit" class="btn">Kirim Pesanan</button>
    </form>

    <div id="hasilPesanan" class="hasil"></div>
  </section>

  <footer>
    <p>© 2025 KueKita | Setiap Gigitan Penuh Kehangatan</p>
  </footer>

  <script>
    const form = document.getElementById("formPemesanan");
    const hasil = document.getElementById("hasilPesanan");

    form.addEventListener("submit", function(event) {
      event.preventDefault(); 

      const nama = document.getElementById("nama").value;
      const nomor = document.getElementById("nomor").value;
      const jenisKue = document.getElementById("jenisKue").value;
      const jumlah = document.getElementById("jumlah").value;
      const alamat = document.getElementById("alamat").value;

      hasil.innerHTML = `
        <div class="konfirmasi">
          <h3>🍰 Pesanan Berhasil Diterima!</h3>
          <p><strong>Nama:</strong> ${nama}</p>
          <p><strong>Nomor HP:</strong> ${nomor}</p>
          <p><strong>Jenis Kue:</strong> ${jenisKue}</p>
          <p><strong>Jumlah:</strong> ${jumlah}</p>
          <p><strong>Alamat:</strong> ${alamat}</p>
          <p>Terima kasih telah memesan di <strong>KueKita</strong>! 🍮</p>
        </div>
      `;

      form.reset();
    });
  </script>
</body>
</html>
